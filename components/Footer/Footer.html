<script>
    document.addEventListener("DOMContentLoaded", function() {
        const badge = document.getElementById('footer-hours-badge');
        if (!badge) return;

        function updateStoreStatus() {
            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();
            
            // Open Mon (1) to Sat (6), 9:00 AM (9) to 5:59 PM (< 18)
            const isOpen = (day >= 1 && day <= 6) && (hour >= 9 && hour < 18);
            
            if (isOpen) {
                badge.innerText = "Open Now";
                badge.style.background = "rgba(16, 185, 129, 0.15)";
                badge.style.color = "#10b981";
                badge.style.border = "1px solid rgba(16, 185, 129, 0.3)";
            } else {
                badge.innerText = "Closed Now";
                badge.style.background = "rgba(239, 68, 68, 0.15)";
                badge.style.color = "#ef4444";
                badge.style.border = "1px solid rgba(239, 68, 68, 0.3)";
            }
        }

        updateStoreStatus();
        // Check dynamically every minute
        setInterval(updateStoreStatus, 60000);
    });
</script>
