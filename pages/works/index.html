<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Work — PRNT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/global/styles.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <section class="hero" style="padding: 4rem 0; text-align: center; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white;">
    <div class="container animate-slide">
      <h1 style="font-size:2.5rem;margin-bottom:0.5rem;">Our Work</h1>
      <p style="margin-bottom:0; opacity:0.9;">Take a look at some of our recent print projects.</p>
    </div>
  </section>

  <section class="work-section" style="padding: 6rem 0;">
    <div class="container">
      <div class="work-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
        <div class="work-item animate-fade" style="background: linear-gradient(135deg, #EE4D2D, #FF6533);">
          <div class="overlay">
            <h4>Business Cards</h4>
            <p>Premium Matte Finish</p>
          </div>
        </div>
        <div class="work-item animate-fade" style="background: linear-gradient(135deg, #10B981, #34D399);">
          <div class="overlay">
            <h4>Event Tarpaulin</h4>
            <p>High-resolution 5x8ft</p>
          </div>
        </div>
        <div class="work-item animate-fade" style="background: linear-gradient(135deg, #F59E0B, #FBBF24);">
          <div class="overlay">
            <h4>Thesis Hardbound</h4>
            <p>Gold Stamped Lettering</p>
          </div>
        </div>
        <div class="work-item animate-fade" style="background: linear-gradient(135deg, #3B82F6, #60A5FA);">
          <div class="overlay">
            <h4>Custom Stickers</h4>
            <p>Die-cut Vinyl</p>
          </div>
        </div>
        <div class="work-item animate-fade" style="background: linear-gradient(135deg, #8B5CF6, #A78BFA);">
          <div class="overlay">
            <h4>Corporate Booklet</h4>
            <p>Saddle-Stitched Annual Report</p>
          </div>
        </div>
        <div class="work-item animate-fade" style="background: linear-gradient(135deg, #EF4444, #F87171);">
          <div class="overlay">
            <h4>Photo Prints</h4>
            <p>Glossy 8x10</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="/global/script.js"></script>
  <script src="./script.js"></script>
</body>
</html>
