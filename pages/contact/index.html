<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — PRNT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/global/styles.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <section class="hero" style="padding: 4rem 0; text-align: center; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white;">
    <div class="container animate-slide">
      <h1 style="font-size:2.5rem;margin-bottom:0.5rem;">Get in Touch</h1>
      <p style="margin-bottom:0; opacity:0.9;">We'd love to hear from you. Send us a message.</p>
    </div>
  </section>

  <section class="contact-section" style="padding: 6rem 0;">
    <div class="container">
      <div class="contact-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;">
        <div class="contact-info animate-fade">
          <h2 style="font-size: 2rem; margin-bottom: 1rem; color: var(--text-dark);">Contact Information</h2>
          <p style="color: var(--text-muted); margin-bottom: 2rem;">Have questions about bulk orders or custom prints? Drop us a line.</p>
          
          <div class="contact-detail" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
            <i class="fas fa-map-marker-alt" style="color:var(--primary); font-size:1.25rem; margin-top:0.25rem;"></i>
            <div>
              <div style="font-weight:600; color:var(--text-dark);">Address</div>
              <span style="color:var(--text-muted);">MacArthur Highway, Malolos, Bulacan (Near BulSU Gate 1)</span>
            </div>
          </div>
          
          <div class="contact-detail" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
            <i class="fas fa-envelope" style="color:var(--primary); font-size:1.25rem; margin-top:0.25rem;"></i>
            <div>
              <div style="font-weight:600; color:var(--text-dark);">Email</div>
              <span style="color:var(--text-muted);">prnt@bulsu.edu.ph</span>
            </div>
          </div>
          
          <div class="contact-detail" style="display: flex; gap: 1rem;">
            <i class="fas fa-phone" style="color:var(--primary); font-size:1.25rem; margin-top:0.25rem;"></i>
            <div>
              <div style="font-weight:600; color:var(--text-dark);">Phone</div>
              <span style="color:var(--text-muted);">+63 912 345 6789</span>
            </div>
          </div>
        </div>

        <div class="card contact-form animate-slide">
          <form onsubmit="handleContactSubmit(event)">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:1.5rem;">
              <div class="form-group">
                <label style="display:block; margin-bottom:0.5rem; font-weight:600; font-size:0.9rem;">Your Name</label>
                <input type="text" id="cName" style="width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:var(--radius); outline:none;" required>
              </div>
              <div class="form-group">
                <label style="display:block; margin-bottom:0.5rem; font-weight:600; font-size:0.9rem;">Your Email</label>
                <input type="email" id="cEmail" style="width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:var(--radius); outline:none;" required>
              </div>
            </div>
            <div class="form-group" style="margin-bottom:1.5rem;">
              <label style="display:block; margin-bottom:0.5rem; font-weight:600; font-size:0.9rem;">Subject</label>
              <input type="text" id="cSubject" style="width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:var(--radius); outline:none;" required>
            </div>
            <div class="form-group" style="margin-bottom:1.5rem;">
              <label style="display:block; margin-bottom:0.5rem; font-weight:600; font-size:0.9rem;">Message</label>
              <textarea id="cMessage" rows="5" style="width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:var(--radius); outline:none; font-family:inherit; resize:vertical;" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; font-size:1.05rem;">
              <i class="fas fa-paper-plane"></i> Send Message
            </button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="/global/script.js"></script>
  <script src="./script.js"></script>
</body>
</html>
