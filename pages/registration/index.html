<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" href="/assets/img/PRNT_logo.png" type="image/png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />

    <link rel="stylesheet" href="/styles/global.css" />
    <link rel="stylesheet" href="styles.css" />

    <title>PRNT</title>
  </head>
  <body>
    <div class="registration-wrapper">
      <div class="glass-card row g-0">
        
        <div class="col-md-6 welcome-side">
          <img src="../../assets/img/PRNT-white.png" class="prnt-logo" alt="PRNT">
          
          <div class="middle-group">
              <h1>Hello, Friend!</h1>
              <p>Share your printing needs and get quality prints.</p>
              
              <div class="signin-section mt-4">
                  <a href="../login/" class="btn-signin">Sign In</a>
                  <p class="small text-white mt-3 opacity-75">Already have an account?</p>
              </div>
          </div>

          <div class="footer-link">
              <a href="../../" class="text-white text-decoration-none small opacity-50">Back to home</a>
          </div>
        </div>

        <div class="col-md-6 form-side p-5 bg-white">
            <h2 class="title text-center mb-4">Create Account</h2>
            
            <form id="signup-form">
                <div class="custom-input mb-3">
                    <i class="fa fa-user"></i>
                    <input type="text" placeholder="Name" class="form-control">
                </div>
                
                <div class="custom-input mb-3">
                    <i class="fa fa-envelope"></i>
                    <input type="email" placeholder="BulSU Email" class="form-control">
                </div>

                <div class="custom-input mb-3">
                    <i class="fa fa-phone"></i>
                    <input type="text" placeholder="Contact Number" class="form-control">
                </div>

                <div class="custom-input mb-3">
                    <i class="fa fa-lock"></i>
                    <input type="password" placeholder="Password" class="form-control">
                </div>

                <div class="custom-input mb-4">
                    <i class="fa fa-lock"></i>
                    <input type="password" placeholder="Confirm Password" class="form-control">
                </div>

                <button type="submit" class="join-btn">
                    Join us <i class="fa fa-arrow-right ms-2"></i>
                </button>
            </form>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
