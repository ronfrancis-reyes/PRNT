<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — PRNT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../global/styles.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="auth-page">
  <div id="navbar-placeholder"></div>

  <section style="min-height:90vh; display:flex; align-items:center; justify-content:center; padding: 2rem 0;">
    <div class="card auth-card animate-slide" style="width:100%; max-width:540px; padding:3rem;">
      <div style="text-align:center; margin-bottom:2rem;">
        <h2 style="font-size:2rem; margin-bottom:0.5rem; color:var(--text-dark);">Join PRNT</h2>
        <p style="color:var(--text-muted);">Create your account to start ordering your prints.</p>
      </div>

      <form onsubmit="handleAuthRegister(event)">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; margin-bottom:1.25rem;">
          <div class="form-group">
            <label style="display:block; margin-bottom:0.5rem; font-weight:600; font-size:0.9rem;">First Name</label>
            <input type="text" id="regFirstName" placeholder="Juan" required style="width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:var(--radius); outline:none;">
          </div>
          <div class="form-group">
            <label style="display:block; margin-bottom:0.5rem; font-weight:600; font-size:0.9rem;">Last Name</label>
            <input type="text" id="regLastName" placeholder="Dela Cruz" required style="width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:var(--radius); outline:none;">
          </div>
        </div>
        <div class="form-group" style="margin-bottom:1.25rem;">
          <label style="display:block; margin-bottom:0.5rem; font-weight:600; font-size:0.9rem;">BulSU Email</label>
          <input type="email" id="regEmail" placeholder="juan@bulsu.edu.ph" required style="width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:var(--radius); outline:none;">
        </div>
        <div class="form-group" style="margin-bottom:1.25rem;">
          <label style="display:block; margin-bottom:0.5rem; font-weight:600; font-size:0.9rem;">Phone Number</label>
          <input type="tel" id="regPhone" placeholder="09XX XXX XXXX" required style="width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:var(--radius); outline:none;">
        </div>
        <div class="form-group" style="margin-bottom:1.5rem;">
          <label style="display:block; margin-bottom:0.5rem; font-weight:600; font-size:0.9rem;">Password</label>
          <input type="password" id="regPassword" placeholder="••••••••" required style="width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:var(--radius); outline:none;">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:1rem; font-size:1.05rem;">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div style="text-align:center; margin-top:2rem; color:var(--text-muted); font-size:0.95rem;">
        Already have an account? <a href="/pages/login/" style="color:var(--primary); font-weight:700;">Login</a>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="../../global/script.js"></script>
  <script src="./script.js"></script>
</body>
</html>
