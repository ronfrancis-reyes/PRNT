<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — PRNT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages.css">
</head>

<body style="background:var(--background);">

  <!-- ===== TOAST CONTAINER ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ===== MOBILE MENU OVERLAY ===== -->
  <div class="mobile-menu-overlay" id="mobileOverlay"></div>
  <div class="mobile-menu" id="mobileMenu">
    <button class="close-menu" onclick="toggleMobileMenu()"><i class="fas fa-times"></i></button>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="work.html">Work</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
    <a href="order.html">Order Now</a>
    <a href="#" onclick="showAuthModal('login')">Login</a>
  </div>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <div class="container flex align-center justify-between" style="width:100%;">
      <a href="index.html" class="logo">
        <i class="fas fa-print"></i> PRNT
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" data-page="home">Home</a></li>
        <li><a href="about.html" data-page="about">About</a></li>
        <li><a href="work.html" data-page="work">Work</a></li>
        <li><a href="services.html" data-page="services">Services</a></li>
        <li><a href="contact.html" data-page="contact">Contact</a></li>
      </ul>
      <div class="flex align-center" style="gap:1rem;">
        <button class="btn btn-primary" onclick="navigateTo('order')" id="orderNowBtn">
          <i class="fas fa-shopping-cart"></i> Order Now
        </button>
        <button class="btn btn-outline" onclick="showAuthModal('login')" id="loginBtn">Login</button>
        <div class="user-nav-profile" id="userNavProfile" style="display:none; cursor:pointer;"
          onclick="navigateTo('profile')">
          <div
            style="width:38px;height:38px;border-radius:50%;background:white;color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;"
            id="navAvatar">JD</div>
        </div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
      </div>
    </div>
  </nav>

  <!-- ===== PROFILE MAIN ===== -->
  <section class="profile-section">
    <div class="container">
      <div class="profile-grid">
        <!-- Sidebar -->
        <div class="profile-sidebar reveal">
          <div class="profile-avatar" id="profileAvatar">JD</div>
          <h3 id="profileName">Juan Dela Cruz</h3>
          <p class="email" id="profileEmail">juan@bulsu.edu.ph</p>
          <div class="profile-menu">
            <button class="active" onclick="switchProfileTab('info', this)"><i class="fas fa-user"
                style="width:20px;"></i> Personal Info</button>
            <button onclick="switchProfileTab('orders', this)"><i class="fas fa-history" style="width:20px;"></i>
              Transaction</button>
            <button onclick="switchProfileTab('security', this)"><i class="fas fa-shield-alt" style="width:20px;"></i>
              Security</button>
            <button onclick="logoutUser()"
              style="color:var(--danger);margin-top:1rem;border-top:1px solid var(--border);border-radius:0;padding-top:1rem;"><i
                class="fas fa-sign-out-alt" style="width:20px;"></i> Logout</button>
          </div>
        </div>

        <!-- Content Area -->
        <div class="profile-content reveal">
          <!-- Tab 1: Info -->
          <div id="profileTab-info">
            <h3>Personal Information</h3>
            <form onsubmit="saveProfile(event)">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">
                <div class="form-group">
                  <label>First Name</label>
                  <input type="text" id="profFirstName" required>
                </div>
                <div class="form-group">
                  <label>Last Name</label>
                  <input type="text" id="profLastName" required>
                </div>
              </div>
              <!-- Email Address Removed Per Requirement -->
              <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="profPhone" required>
              </div>
              <button type="submit" class="btn btn-primary" style="margin-top:1rem;"><i class="fas fa-save"></i> Save
                Changes</button>
            </form>
          </div>

          <!-- Tab 2: Transaction -->
          <div id="profileTab-orders" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
              <h3 style="margin:0;">Transaction</h3>
              <div class="flex"
                style="gap:0.5rem; background:var(--background); padding:0.4rem; border-radius:12px; border:1px solid var(--border);">
                <button class="btn btn-primary" id="btnStatusView" style="padding:0.6rem 1rem; font-size:0.85rem;"
                  onclick="toggleTransactionView('status')">
                  <i class="fas fa-clock"></i> Order Status
                </button>
                <button class="btn btn-outline" id="btnHistoryView" style="padding:0.6rem 1rem; font-size:0.85rem;"
                  onclick="toggleTransactionView('history')">
                  <i class="fas fa-list"></i> Order History
                </button>
              </div>
            </div>

            <!-- Section: Active Order Tracking -->
            <div id="activeStatusView">
              <div id="trackingCards">
                <!-- Active orders cards will be rendered here -->
              </div>
            </div>

            <!-- Section: Order History Table -->
            <div id="historyTableView" style="display:none;">
              <div style="overflow-x:auto;">
                <table class="history-table">
                  <thead>
                    <tr>
                      <th style="width:120px;">Order ID</th>
                      <th style="width:50px;">File Name</th>
                      <th style="width:110px;">Date/Time</th>
                      <th style="width:100px;">Total</th>
                      <th style="width:150px; text-align:center;">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="historyBody"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- Tab 3: Security -->
          <div id="profileTab-security" style="display:none;">
            <h3>Security & Password</h3>
            <form onsubmit="changePassword(event)">
              <div class="form-group"><label>Current Password</label><input type="password" required></div>
              <div class="form-group"><label>New Password</label><input type="password" id="newPass" required></div>
              <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPass"
                  required></div>
              <button type="submit" class="btn btn-primary" style="margin-top:1rem;"><i class="fas fa-key"></i> Update
                Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== RECEIPT MODAL ===== -->
  <div class="modal-overlay" id="receiptModal">
    <div class="modal" style="max-width:600px; padding:0; overflow:hidden;">
      <div class="modal-header" style="padding:1.5rem 2rem; border-bottom:1px solid #F0F0F0;">
        <h3 style="margin:0;"><i class="fas fa-file-invoice" style="color:var(--primary); margin-right:0.5rem;"></i>
          Order Receipt</h3>
        <button class="modal-close" onclick="closeModal('receiptModal')"><i class="fas fa-times"></i></button>
      </div>
      <div id="receiptModalContent" style="max-height:50vh; overflow-y:auto; padding:2rem;">
      </div>
      <div
        style="padding:1.5rem 2rem; background:#FAFAFA; border-top:1px solid #F0F0F0; display:flex; justify-content:flex-end;">
        <button class="btn btn-primary" onclick="window.print()"><i class="fas fa-print"></i> Print Receipt</button>
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>

</html>
