<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — PRNT Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../../global/styles.css">
  <link rel="stylesheet" href="../../../assets/css/admin.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="admin-page">
  <div class="admin-layout">
    <div id="sidebar-placeholder"></div>
    <div class="admin-main">
      <div id="header-placeholder"></div>
      <div class="admin-body">
        <!-- Analytics Content -->
        <h3>Sales Analytics</h3>
        <div class="stat-cards animate-fade" style="margin-top:1.5rem;">
          <div class="stat-card">
            <h4>Monthly Orders</h4>
            <div class="stat-value">342</div>
            <div class="stat-change up">↑ 15%</div>
          </div>
          <div class="stat-card">
            <h4>Total Revenue</h4>
            <div class="stat-value" id="totalRev">₱128k</div>
            <div class="stat-change up">↑ 8%</div>
          </div>
          <div class="stat-card">
            <h4>Avg Trans</h4>
            <div class="stat-value">₱150</div>
            <div class="stat-change down">↓ 2%</div>
          </div>
        </div>

        <div class="chart-row animate-slide" style="margin-top:2rem;">
          <div class="chart-card">
            <div class="chart-header">
              <h3>Revenue Trend</h3>
              <select><option>Monthly</option></select>
            </div>
            <canvas id="revenueTrendChart" style="width:100%; height:260px;"></canvas>
          </div>
          <div class="chart-card">
             <h3>User Acquisition</h3>
             <canvas id="userAcqChart" style="width:100%; height:260px;"></canvas>
          </div>
        </div>

        <!-- Top Products Table -->
        <div class="table-panel animate-fade" style="margin-top:2rem;">
          <div class="table-header" style="padding:1.5rem; display:flex; justify-content:space-between; align-items:center;">
             <h3>Top Services</h3>
             <button class="export-btn" onclick="exportAnalytics()"><i class="fas fa-download"></i> Export Data</button>
          </div>
          <div class="table-responsive">
            <table class="admin-table">
               <thead><tr><th>Service Name</th><th>Format / Size</th><th>Units Sold</th><th>Total Revenue</th></tr></thead>
               <tbody id="topProductsBody">
                  <tr><td style="padding:1rem;">Document Printing</td><td>A4 Paper</td><td>12,450</td><td style="font-weight:700;">₱24,900</td></tr>
                  <tr><td style="padding:1rem;">Photo Printing</td><td>4R High Gloss</td><td>3,210</td><td style="font-weight:700;">₱32,100</td></tr>
                  <tr><td style="padding:1rem;">Tarpaulin</td><td>2x3 ft</td><td>842</td><td style="font-weight:700;">₱42,100</td></tr>
               </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
  <script src="../../../global/script.js"></script>
  <script src="./script.js"></script>
</body>
</html>
