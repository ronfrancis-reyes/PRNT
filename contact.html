<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<!--Tab Logo-->
		<link rel="icon" href="assets/img/PRNT_logo.png" type="image/png" />
		<!--Logo Library -->
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
		/>
		<link rel="stylesheet" href="assets\css\main.css" />
		<link rel="stylesheet" href="assets/css/contact.css">
		<title>PRNT</title>
	</head>
	<body>
		<!-- heading/navigation bar -->

		<div id="nav"></div>
		<script>
				fetch("nav.html")
				.then(response => response.text())
				.then(data =>{
					document.getElementById("nav").innerHTML = data;
				});
		</script>

		<!-- start of body-->
</nav>


<div style="height: 120px;"></div>

<header class="container mb-4 p-0">

    <div class="d-flex align-items-center mb-2">
         <small><span class="dot"></span>CONTACT</small>
    </div>

    <div class="row align-items-end g-0">
        <div class="col-lg-7">
            <h1 class="display-1 fw-bolder mb-0 header-title">Ready to print?</h1>
        </div>
        <div class="col-lg-5">
            <p class="text-secondary description-text mb-2">
                At the heart of our printing process is a commitment to actively listen & understand your unique challenges & needs.
            </p>
        </div>
    </div>
</header>
<div class="container pb-5">
    <div class="row g-4"> 
        
        <div class="col-lg-4">
            <div class="orange-card h-100 p-5 d-flex flex-column justify-content-between rounded-4 text-white" style="background-color: #FF4400;">
                <div>
                    <h2 class="fw-bold display-6">Start to print your project</h2>
                    <p class="mt-3 opacity-75">Whether your project is fully defined or still taking shape, we're here to support you.</p>
                </div>
                <a href="index.html" class="back-link mt-5">BACK TO HOME ↗</a>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="form-panel-container h-100 p-5 rounded-4 bg-black text-white border border-secondary">
                <form id="contact-form">
                    <div class="mb-4">
                        <label class="form-label text-secondary small">Name</label>
                        <input type="text" class="form-control custom-input" placeholder="Enter your Name">
                    </div>
                    
                    <div class="mb-4">
    <label class="form-label text-secondary small">Phone Number</label>
    <input type="text" class="form-control custom-input" placeholder="(+63)">
</div>

<div class="mb-4">
    <label class="form-label text-secondary small">Location</label>
    <input type="text" class="form-control custom-input" placeholder="Enter your exact location">
</div>

                    <div class="mb-4">
                        <label class="text-secondary small mb-2">Service</label>
                        <select class="form-select bg-dark border-secondary text-white p-3 custom-input">
                            <option selected disabled>Select a service</option>
                            <option value="1">Document Printing</option>
                            <option value="2">Photocopying</option>
                            <option value="3">Book Binding</option>
                            <option value="4">Poster & Large Format Printing</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="text-secondary small mb-2">Is there any other information...</label>
                        <textarea class="form-control bg-dark border-secondary text-white p-3" rows="3" placeholder="Tell us about your needs..."></textarea>
                    </div>

                    <button type="submit" class="btn submit-btn px-5 py-2 rounded-pill fw-bold text-white" style="background-color: #FF4400;">Submit</button>
                </form>
            </div>
        </div>

    </div>
</div>

		<!-- footer -->
		<div id="footer"></div>
		<script>
				fetch("footer.html")
				.then(response => response.text())
				.then(data =>{
					document.getElementById("footer").innerHTML = data;
				});
		</script>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
			crossorigin="anonymous"
		></script>
	</body>
</html>
